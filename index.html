<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GhastRider</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="icon" type="image/png" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="shortcut icon" href="./favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="GhastRider">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Prevent selection and context menus for immersive mobile play */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0a0101;
            font-family: 'Press Start 2P', cursive;
            touch-action: none;
            position: fixed;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            overflow: hidden;
        }

        canvas { 
            display: block; 
            image-rendering: pixelated;
            touch-action: none;
        }

        .ui-panel {
            position: absolute; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
        }

        .box {
            background: #1a0505; border: 4px solid #3d1a28;
            padding: 20px; text-align: center; color: white;
            width: 90%; max-width: 360px;
            pointer-events: auto;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 { color: #ff4d4d; font-size: 14px; margin-bottom: 15px; line-height: 1.5; text-shadow: 2px 2px 0 #000; }
        h2 { color: #ffd700; font-size: 10px; margin: 15px 0 10px; }

        .btn {
            background: #e63946; border: none; border-bottom: 4px solid #9d1b24;
            color: white; padding: 12px 0; font-family: 'Press Start 2P', cursive;
            font-size: 10px; cursor: pointer; width: 100%; display: block;
            margin-top: 10px;
        }

        .btn.tall { padding: 22px 0; font-size: 11px; }
        .btn.secondary { background: #4b3621; border-bottom: 4px solid #2b1d14; }
        .btn.toggle-on { background: #2f8f6b; border-bottom: 4px solid #1d5c45; }
        .btn:active { transform: translateY(2px); border-bottom-width: 2px; }

        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .char-card { border: 2px solid #3d1a28; padding: 10px; cursor: pointer; background: #000; transition: border-color 0.2s; }
        .char-card.selected { border-color: #ffd700; background: #2b0707; }
        .char-label { font-size: 8px; margin-top: 5px; color: #fff; }

        .leaderboard {
            text-align: left; font-size: 7px; background: #000; padding: 10px;
            border: 2px solid #3d1a28; margin-top: 10px; line-height: 1.6;
        }
        .leaderboard-row {
            display: grid;
            grid-template-columns: 34px minmax(58px, 1fr) 26px 26px 26px 34px;
            column-gap: 6px;
            align-items: center;
            margin-bottom: 4px;
            color: #aaa;
        }
        .leaderboard-row.header { color: #ff4d4d; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 8px; }
        .leaderboard-row.highlight { color: #ffd700; }
        .leaderboard-row span:nth-child(1),
        .leaderboard-row span:nth-child(n + 3) { text-align: right; }
        .leaderboard-row span:nth-child(2) {
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #hud {
            position: absolute; top: env(safe-area-inset-top, 15px); left: 15px;
            color: #ffd700; font-size: 8px; z-index: 50;
            text-shadow: 2px 2px 0 #000; display: none;
            pointer-events: none; line-height: 1.8;
        }

        .score-accent { color: #6ee7b7; }

        .hidden { display: none !important; }
        .loading-text { font-size: 10px; color: #ffd700; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="game-container">
    <div id="hud">
        PLAYER: <span id="hud-name">...</span><br>
        EMERALDS: 0<br>
        SCRAPS: 0<br>
        WALLS : 0
    </div>

    <!-- MAIN MENU -->
    <div id="menu-screen" class="ui-panel">
        <div class="box">
            <h1>GHASTRIDER</h1>
            <div id="player-loading" class="loading-text">Fetching Players...</div>
            <div id="selection-area" class="hidden">
                <h2>SELECT PLAYER</h2>
                <div id="char-grid" class="char-grid"></div>
                <button class="btn tall" id="start-btn">START MISSION</button>
                <button class="btn secondary" id="sound-toggle-btn">SFX: ON</button>
            </div>
            <h2>LEADERBOARD</h2>
            <div id="leaderboard-box" class="leaderboard">
                <div class="leaderboard-row header"><span>RANK</span><span>NAME</span><span>EMR</span><span>SCR</span><span>WAL</span><span>SCORE</span></div>
                <div id="leaderboard-content">Loading...</div>
            </div>
        </div>
    </div>

    <!-- MISSION FAILED SCREEN -->
    <div id="death-screen" class="ui-panel hidden">
        <div class="box">
            <h1>MISSION FAILED</h1>
            <p id="final-emeralds" style="color: #6ee7b7; margin: 10px 0; font-size: 10px;">EMERALDS: 0</p>
            <p id="final-scraps" style="color: #ffd700; margin: 10px 0; font-size: 10px;">SCRAPS: 0</p>
            <p id="final-walls" style="color: #ffffff; margin: 10px 0; font-size: 10px;">WALLS: 0</p>
            <p id="final-total" style="color: #ffffff; margin: 10px 0; font-size: 10px;">SCORE: 0</p>
            <button class="btn tall" id="retry-btn">TRY AGAIN</button>
            <h2>LEADERBOARD</h2>
            <div class="leaderboard">
                <div class="leaderboard-row header"><span>RANK</span><span>NAME</span><span>EMR</span><span>SCR</span><span>WAL</span><span>SCORE</span></div>
                <div id="leaderboard-content-death">Loading...</div>
            </div>
            <button class="btn secondary" id="switch-btn" style="margin-top: 20px;">SWITCH PLAYER</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script src="./config.js"></script>
<script>
    const GAME_CONFIG = window.GAME_CONFIG || {
      firebaseURL: "",
      defaultPlayers: ["Theo", "Tadeu", "Luise", "Max"]
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Refs
    const hud = document.getElementById('hud'), 
          hudName = document.getElementById('hud-name'),
          menuScreen = document.getElementById('menu-screen'), 
          deathScreen = document.getElementById('death-screen'),
          finalEmeraldsText = document.getElementById('final-emeralds'),
          finalScrapsText = document.getElementById('final-scraps'), 
          finalWallsText = document.getElementById('final-walls'),
          finalTotalText = document.getElementById('final-total'),
          lbContent = document.getElementById('leaderboard-content'), 
          lbContentDeath = document.getElementById('leaderboard-content-death'),
          charGrid = document.getElementById('char-grid'), 
          playerLoading = document.getElementById('player-loading'),
          selectionArea = document.getElementById('selection-area'),
          soundToggleBtn = document.getElementById('sound-toggle-btn');

    // Engine variables
    let lastTime = 0, spawnTimer = 0, scrapTimer = 0, powerupTimeLeft = 0, fireResistTimeLeft = 0, pickupFlashTimeLeft = 0, lavaScroll = 0, wasTouchingLava = false;
    let collectibleSpawnsCounter = 0,
        nextNuggetAt = Math.floor(Math.random() * 6) + 5,
        nextPotionAt = (Math.floor(Math.random() * 6) + 5) * 2;
    let nextVillagerAt = Math.floor(Math.random() * 8) + 12, rewardTimer = 0, deathTimer = 0, deathCause = null;

    // Game state
    let state = 'MENU', scrapScore = 0, wallScore = 0, emeraldScore = 0, isThrusting = false, showTrajectory = false;
    let entities = [], particles = [], trail = [], bgLayers = [], ashParticles = [];
    let selectedPlayer = 'Theo', leaderboard = {};
    let audioCtx = null, masterGain = null, audioCompressor = null, audioReady = false, lastThrusterSoundAt = 0;
    let soundEnabled = (() => {
        try { return localStorage.getItem('ghastrider-sfx-enabled') !== '0'; }
        catch (e) { return true; }
    })();

    const BASE_FPS = 60, SCROLL_SPEED = 4.5, POWERUP_DURATION = 5000, FIRE_RESIST_DURATION = 7000;

    const player = {
        x: 60, y: 0, w: 32, h: 32, vy: 0,
        gravity: 0.20, thrust: -0.48,
        reset() { this.y = canvas.height / 2; this.vy = 0; }
    };

    function calculateTotalScore(scores) {
        return (scores.emeralds || 0) * 10 + (scores.scraps || 0) * 3 + (scores.walls || 0);
    }

    function ensureAudio() {
        if (!soundEnabled) return false;
        if (audioReady) return true;
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return false;
        if (!audioCtx) {
            audioCtx = new AudioContextClass();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.42;
            audioCompressor = audioCtx.createDynamicsCompressor();
            audioCompressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
            audioCompressor.knee.setValueAtTime(18, audioCtx.currentTime);
            audioCompressor.ratio.setValueAtTime(10, audioCtx.currentTime);
            audioCompressor.attack.setValueAtTime(0.003, audioCtx.currentTime);
            audioCompressor.release.setValueAtTime(0.18, audioCtx.currentTime);
            masterGain.connect(audioCompressor);
            audioCompressor.connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
        audioReady = audioCtx.state === 'running';
        return audioReady;
    }

    function updateSoundToggleUI() {
        soundToggleBtn.innerText = `SFX: ${soundEnabled ? 'ON' : 'OFF'}`;
        soundToggleBtn.classList.toggle('toggle-on', soundEnabled);
    }

    function setSoundEnabled(enabled) {
        soundEnabled = enabled;
        try { localStorage.setItem('ghastrider-sfx-enabled', soundEnabled ? '1' : '0'); } catch (e) {}
        if (masterGain) masterGain.gain.value = soundEnabled ? 0.42 : 0;
        updateSoundToggleUI();
    }

    function playTone(type, frequency, startTime, duration, volume, frequencyEnd = frequency) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, startTime);
        osc.frequency.exponentialRampToValueAtTime(Math.max(40, frequencyEnd), startTime + duration);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(startTime);
        osc.stop(startTime + duration);
    }

    function playNoise(startTime, duration, volume, filterType, frequency) {
        const buffer = audioCtx.createBuffer(1, Math.max(1, Math.floor(audioCtx.sampleRate * duration)), audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = filterType;
        filter.frequency.setValueAtTime(frequency, startTime);

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(volume, startTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        source.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);
        source.start(startTime);
        source.stop(startTime + duration);
    }

    function playSound(effect) {
        if (!ensureAudio()) return;
        const now = audioCtx.currentTime;

        if (effect === 'scrap') {
            playTone('square', 520, now, 0.07, 0.11, 760);
            playTone('triangle', 380, now + 0.02, 0.08, 0.08, 520);
        } else if (effect === 'menu-select') {
            playTone('square', 460, now, 0.07, 0.08, 620);
            playTone('triangle', 620, now + 0.04, 0.08, 0.06, 760);
        } else if (effect === 'menu-toggle-on') {
            playTone('square', 340, now, 0.08, 0.08, 520);
            playTone('triangle', 520, now + 0.05, 0.1, 0.07, 760);
        } else if (effect === 'menu-toggle-off') {
            playTone('triangle', 420, now, 0.08, 0.06, 300);
            playTone('sine', 260, now + 0.03, 0.09, 0.05, 180);
        } else if (effect === 'menu-start') {
            playTone('square', 280, now, 0.07, 0.07, 420);
            playTone('square', 420, now + 0.05, 0.08, 0.08, 620);
            playTone('triangle', 620, now + 0.1, 0.12, 0.08, 920);
        } else if (effect === 'nugget') {
            playTone('square', 420, now, 0.12, 0.12, 960);
            playTone('triangle', 700, now + 0.05, 0.16, 0.1, 1320);
            playNoise(now, 0.12, 0.032, 'highpass', 1200);
        } else if (effect === 'potion') {
            playTone('triangle', 280, now, 0.13, 0.095, 560);
            playTone('sine', 620, now + 0.06, 0.22, 0.085, 980);
            playNoise(now + 0.03, 0.14, 0.024, 'bandpass', 950);
        } else if (effect === 'emerald') {
            playTone('triangle', 520, now, 0.1, 0.1, 780);
            playTone('triangle', 780, now + 0.07, 0.12, 0.11, 1180);
            playTone('sine', 980, now + 0.15, 0.18, 0.085, 1460);
        } else if (effect === 'wall-hit') {
            playNoise(now, 0.16, 0.055, 'lowpass', 700);
            playTone('sawtooth', 180, now, 0.18, 0.075, 70);
        } else if (effect === 'lava-hit') {
            playNoise(now, 0.22, 0.07, 'bandpass', 540);
            playTone('sawtooth', 240, now, 0.2, 0.08, 80);
        } else if (effect === 'lava-splash') {
            playNoise(now, 0.1, 0.03, 'bandpass', 850);
            playTone('triangle', 170, now, 0.08, 0.05, 120);
        } else if (effect === 'start') {
            playTone('square', 320, now, 0.08, 0.08, 480);
            playTone('square', 520, now + 0.06, 0.1, 0.09, 760);
        } else if (effect === 'thruster') {
            if (now - lastThrusterSoundAt < 0.09) return;
            lastThrusterSoundAt = now;
            playNoise(now, 0.05, 0.024, 'highpass', 600);
            playTone('triangle', 150, now, 0.05, 0.038, 110);
        }
    }

    // --- DATA FETCHING ---
    async function fetchLeaderboard() {
        try {
            const res = await fetch(`${GAME_CONFIG.firebaseURL}.json`);
            const data = await res.json();
            leaderboard = data || {};
            populateCharacterSelection();
            renderLeaderboard();
            playerLoading.classList.add('hidden');
            selectionArea.classList.remove('hidden');
        } catch (err) {
            // Fallback for preview or errors
            populateCharacterSelection();
            playerLoading.classList.add('hidden');
            selectionArea.classList.remove('hidden');
        }
    }

    function populateCharacterSelection() {
        let names = Object.keys(leaderboard);
        if (names.length === 0) names = GAME_CONFIG.defaultPlayers;
        charGrid.innerHTML = '';
        names.forEach(name => {
            const card = document.createElement('div');
            card.className = `char-card ${name === selectedPlayer ? 'selected' : ''}`;
            const cv = document.createElement('canvas');
            cv.width = 32; cv.height = 32; cv.style.width = '64px'; cv.style.height = '64px';
            const label = document.createElement('div');
            label.className = 'char-label'; label.innerText = name.toUpperCase();
            card.append(cv, label); charGrid.appendChild(card);
            const pctx = cv.getContext('2d');
            pctx.imageSmoothingEnabled = false;
            drawPixelPlayer(pctx, 4, 15, name, 0, false, false, false);
            card.onclick = () => {
                ensureAudio();
                playSound('menu-select');
                selectedPlayer = name;
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                hudName.innerText = selectedPlayer.toUpperCase();
                renderLeaderboard();
            };
        });
        hudName.innerText = selectedPlayer.toUpperCase();
    }

    function renderLeaderboard() {
        const list = Object.keys(leaderboard).map(n => ({
            name: n,
            emeralds: leaderboard[n].emeralds || 0,
            scraps: leaderboard[n].scraps || 0,
            walls: leaderboard[n].walls || 0,
            total: calculateTotalScore(leaderboard[n] || {})
        })).sort((a, b) => b.total - a.total);

        const html = list.map((item, i) => {
            const rank = i + 1;
            const suffix = rank === 1 ? 'st' : rank === 2 ? 'nd' : rank === 3 ? 'rd' : 'th';
            return `<div class="leaderboard-row ${item.name === selectedPlayer ? 'highlight' : ''}">
                <span>${rank}${suffix}</span><span>${item.name.toUpperCase()}</span>
                <span>${item.emeralds}</span><span>${item.scraps}</span><span>${item.walls}</span><span>${item.total}</span>
            </div>`;
        }).join('');
        lbContent.innerHTML = lbContentDeath.innerHTML = html || "No scores.";
    }

    async function updatePlayer(name, emeralds, scraps, walls) {
        if (!GAME_CONFIG.firebaseURL) return;
        const existing = leaderboard[name] || { emeralds: 0, scraps: 0, walls: 0 };
        if (calculateTotalScore({ emeralds, scraps, walls }) <= calculateTotalScore(existing)) return;
        try {
            await fetch(`${GAME_CONFIG.firebaseURL}/${name}.json`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ emeralds, scraps, walls })
            });
            fetchLeaderboard(); 
        } catch(e) {}
    }

    // --- RENDER HELPERS ---
    function drawPixelPlayer(ctx, x, y, name, time, isGold, isFire, blink) {
        if (blink && Math.floor(time / 60) % 2 === 0) return;
        const isDead = state === 'DYING';
        if (pickupFlashTimeLeft > 0) {
            ctx.fillStyle = `rgba(255, 248, 220, ${Math.min(0.9, pickupFlashTimeLeft / 220)})`;
            ctx.fillRect(x + 2, y - 14, 12, 18);
        }
        const glowFlicker = Math.abs(Math.sin(time * 0.02));
        const skinTone = isDead ? '#8f745f' : isFire ? '#ffb26b' : isGold ? '#ffe680' : '#ffdbac';
        ctx.fillStyle = skinTone; 
        ctx.fillRect(x + 5, y - 10, 6, 6);
        if (isDead) {
            ctx.fillStyle = '#1b1b1b'; ctx.fillRect(x + 5, y - 4, 6, 6);
            ctx.fillStyle = '#5a5a5a'; ctx.fillRect(x + 4, y - 11, 8, 2);
            ctx.fillStyle = '#2c2c2c'; ctx.fillRect(x + 6, y - 8, 1, 1); ctx.fillRect(x + 9, y - 8, 1, 1);
            ctx.fillStyle = '#6f4b4b'; ctx.fillRect(x + 7, y - 6, 2, 1);
        } else if (!isGold && !isFire) {
            const low = name.toLowerCase();
            if (low === 'theo') {
                ctx.fillStyle = '#4b3621'; ctx.fillRect(x + 4, y - 11, 8, 2); 
                ctx.fillRect(x + 4, y - 10, 2, 3); ctx.fillRect(x + 10, y - 10, 2, 3); 
                ctx.fillStyle = '#5c3a21'; ctx.fillRect(x + 6, y - 8, 1, 1); ctx.fillRect(x + 9, y - 8, 1, 1);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(x + 5, y - 4, 6, 6);
                ctx.fillStyle = '#20b2aa'; ctx.fillRect(x + 5, y - 4, 6, 2);
            } else if (low === 'tadeu') {
                ctx.fillStyle = '#111'; ctx.fillRect(x + 5, y - 11, 6, 2);
                ctx.fillStyle = '#333'; ctx.fillRect(x + 6, y - 8, 1, 1); ctx.fillRect(x + 9, y - 8, 1, 1);
                ctx.fillStyle = '#1e40af'; ctx.fillRect(x + 5, y - 4, 6, 6);
            } else if (low === 'luise') {
                ctx.fillStyle = '#ea580c'; ctx.fillRect(x + 4, y - 11, 8, 2);
                ctx.fillRect(x + 4, y - 9, 2, 10); ctx.fillRect(x + 10, y - 9, 2, 10);
                ctx.fillStyle = '#5c3a21'; ctx.fillRect(x + 6, y - 8, 1, 1); ctx.fillRect(x + 9, y - 8, 1, 1);
                ctx.fillStyle = '#db2777'; ctx.fillRect(x + 5, y - 4, 6, 6);
            } else if (low === 'max') {
                ctx.fillStyle = '#fbbf24'; ctx.fillRect(x + 5, y - 11, 6, 2);
                ctx.fillStyle = '#1d4ed8'; ctx.fillRect(x + 6, y - 8, 1, 1); ctx.fillRect(x + 9, y - 8, 1, 1);
                ctx.fillStyle = '#15803d'; ctx.fillRect(x + 5, y - 4, 6, 6);
            } else {
                ctx.fillStyle = '#222'; ctx.fillRect(x + 5, y - 11, 6, 2);
                ctx.fillStyle = '#7c2d12'; ctx.fillRect(x + 5, y - 4, 6, 6);
            }
            ctx.fillStyle = '#e2a698'; ctx.fillRect(x + 7, y - 6, 2, 1);
        } else if (isFire) {
            ctx.fillStyle = '#ff8a1f'; ctx.fillRect(x + 5, y - 4, 6, 6);
            ctx.fillStyle = '#ffd166'; ctx.fillRect(x + 6, y - 3, 4, 4);
            ctx.fillStyle = '#ff5a1f'; ctx.fillRect(x + 4, y - 12, 2, 3); ctx.fillRect(x + 10, y - 13, 2, 4);
            ctx.fillStyle = '#ffd9a3'; ctx.fillRect(x + 6, y - 13, 3, 2);
            ctx.fillStyle = `rgba(255, 149, 0, ${0.25 + glowFlicker * 0.35})`;
            ctx.fillRect(x + 3, y - 6, 10, 11);
        } else {
            ctx.fillStyle = '#ffef8a'; ctx.fillRect(x + 5, y - 4, 6, 6);
            ctx.fillStyle = '#fff7cc'; ctx.fillRect(x + 6, y - 9, 2, 2); ctx.fillRect(x + 5, y - 2, 4, 4);
            ctx.fillStyle = `rgba(255, 235, 120, ${0.25 + glowFlicker * 0.3})`;
            ctx.fillRect(x + 4, y - 5, 8, 8);
        }
    }

    function drawPixelGhast(ctx, x, y, time, isGold, isFire, blink) {
        if (blink && Math.floor(time / 60) % 2 === 0) return;
        const isDead = state === 'DYING';
        if (pickupFlashTimeLeft > 0) {
            ctx.fillStyle = `rgba(255, 248, 220, ${Math.min(0.75, pickupFlashTimeLeft / 260)})`;
            ctx.fillRect(x - 3, y - 4, 34, 28);
        }
        const shimmer = Math.abs(Math.sin(time * 0.02));
        ctx.fillStyle = isDead ? '#8e8e8e' : isFire ? '#ffb15e' : isGold ? '#ffdd55' : '#ffffff'; ctx.fillRect(x, y, 28, 20);
        if (isDead) {
            ctx.fillStyle = '#2b2b2b'; ctx.fillRect(x + 15, y + 6, 4, 1); ctx.fillRect(x + 23, y + 6, 4, 1);
            ctx.fillRect(x + 16, y + 5, 2, 1); ctx.fillRect(x + 24, y + 5, 2, 1);
            ctx.fillStyle = '#5b2c2c'; ctx.fillRect(x + 18, y + 12, 5, 2);
            ctx.fillRect(x + 19, y + 13, 3, 1);
            ctx.fillStyle = '#7c7c7c';

    function drawTrajectoryOverlay(timestamp) {
        if (!showTrajectory || state !== 'PLAYING') return;

        const previewPoints = [];
        const lavaCeiling = canvas.height - 40;
        let simY = player.y;
        let simVy = player.vy;
        let collided = false;

        for (let step = 0; step < 90; step++) {
            if (isThrusting) simVy += player.thrust;
            simVy += player.gravity;
            simY += simVy;

            if (simY < 0) {
                simY = 0;
                simVy = 0;
            }

            if (simY > lavaCeiling) {
                simY = lavaCeiling;
                if (fireResistTimeLeft <= 0) collided = true;
                else if (simVy > 1.5) simVy = 1.5;
            }

            previewPoints.push({ x: player.x + step * SCROLL_SPEED, y: simY + player.h * 0.48 });

            const hitbox = getPlayerHitboxAt(player.x, simY);
            for (const entity of entities) {
                if (!isWallEntity(entity)) continue;
                const futureX = entity.x - (step + 1) * SCROLL_SPEED;
                if (hitbox.x < futureX + entity.w && hitbox.x + hitbox.w > futureX && hitbox.y < entity.y + entity.h && hitbox.y + hitbox.h > entity.y) {
                    if (powerupTimeLeft <= 0 && fireResistTimeLeft <= 0) collided = true;
                    break;
                }
            }

            if (collided) break;
        }

        if (previewPoints.length < 2) return;

        ctx.save();
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(255, 214, 102, 0.8)';
        ctx.setLineDash([8, 6]);
        ctx.lineDashOffset = -timestamp * 0.03;
        ctx.beginPath();
        ctx.moveTo(previewPoints[0].x, previewPoints[0].y);
        for (let i = 1; i < previewPoints.length; i++) ctx.lineTo(previewPoints[i].x, previewPoints[i].y);
        ctx.stroke();

        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255, 250, 220, 0.7)';
        ctx.setLineDash([2, 8]);
        ctx.lineDashOffset = -timestamp * 0.05;
        ctx.stroke();

        for (let i = 0; i < previewPoints.length; i += 6) {
            const point = previewPoints[i];
            const glow = 0.25 + Math.sin(timestamp * 0.01 + i) * 0.08;
            ctx.fillStyle = `rgba(255, 240, 180, ${glow})`;
            ctx.fillRect(point.x - 2, point.y - 2, 4, 4);
        }

        if (collided) {
            const finalPoint = previewPoints[previewPoints.length - 1];
            ctx.fillStyle = 'rgba(255, 120, 90, 0.85)';
            ctx.beginPath();
            ctx.arc(finalPoint.x, finalPoint.y, 7, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function isWallEntity(entity) {
        return entity.type === 'wall' || entity.type === 'wall-bottom';
    }

    function collidesWithWallBox(x, y, w, h) {
        return entities.some((entity) => {
            if (!isWallEntity(entity)) return false;
            return x < entity.x + entity.w && x + w > entity.x && y < entity.y + entity.h && y + h > entity.y;
        });
    }

    function findCollectibleSpawnPosition(spawnX, width, height, floatAmplitude) {
        const horizontalPadding = 12;
        const verticalPadding = 14 + floatAmplitude;
        const usableTop = 24 + floatAmplitude;
        const usableBottom = canvas.height - 20 - height - verticalPadding;
        if (usableBottom <= usableTop) return null;

        const itemLeft = spawnX - horizontalPadding;
        const itemWidth = width + horizontalPadding * 2;
        const blockingWalls = entities
            .filter((entity) => isWallEntity(entity) && itemLeft < entity.x + entity.w && itemLeft + itemWidth > entity.x)
            .sort((a, b) => a.y - b.y);

        let safeBands = [{ top: usableTop, bottom: usableBottom }];
        for (const wall of blockingWalls) {
            const blockTop = Math.max(usableTop, wall.y - verticalPadding);
            const blockBottom = Math.min(usableBottom, wall.y + wall.h + verticalPadding);
            if (blockBottom <= blockTop) continue;
            const nextBands = [];
            for (const band of safeBands) {
                if (blockBottom <= band.top || blockTop >= band.bottom) {
                    nextBands.push(band);
                    continue;
                }
                if (blockTop > band.top) nextBands.push({ top: band.top, bottom: blockTop });
                if (blockBottom < band.bottom) nextBands.push({ top: blockBottom, bottom: band.bottom });
            }
            safeBands = nextBands;
            if (safeBands.length === 0) return null;
        }

        const viableBands = safeBands.filter((band) => band.bottom - band.top >= height);
        if (viableBands.length === 0) return null;

        const band = viableBands[Math.floor(Math.random() * viableBands.length)];
        const spawnY = band.top + Math.random() * (band.bottom - band.top - height);
        if (!collidesWithWallBox(spawnX, spawnY - floatAmplitude, width, height + floatAmplitude * 2)) {
            return { x: spawnX, y: spawnY };
        }
        return null;
    }

    function spawnCollectible(type, width, height, floatAmplitude) {
        const spawnX = canvas.width + 20;
        const spawnPos = findCollectibleSpawnPosition(spawnX, width, height, floatAmplitude);
        if (spawnPos) entities.push({ x: spawnPos.x, y: spawnPos.y, w: width, h: height, type });
    }

    function spawnVillager() {
        if (entities.some((entity) => entity.type === 'villager')) return;

    }

    function drawLava(timestamp) {
        const lavaTop = canvas.height - 20;
        const waveA = Math.sin(timestamp * 0.004) * 2;
        const waveB = Math.sin(timestamp * 0.007 + 1.4) * 2;
        const lavaOffset = ((lavaScroll % 44) + 44) % 44;
        const textureOffset = ((lavaScroll % 28) + 28) % 28;
        const bubbleOffset = ((lavaScroll % 120) + 120) % 120;

        ctx.fillStyle = '#b81f00';
        ctx.fillRect(0, lavaTop - 8, canvas.width, 28);

        const gradient = ctx.createLinearGradient(0, lavaTop - 6, 0, canvas.height);
        gradient.addColorStop(0, '#ffb347');
        gradient.addColorStop(0.28, '#ff6a1f');
        gradient.addColorStop(0.75, '#d73300');
        gradient.addColorStop(1, '#7c1200');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, lavaTop, canvas.width, 20);

        ctx.fillStyle = 'rgba(255, 236, 160, 0.5)';
        for (let x = -44 - lavaOffset; x < canvas.width + 44; x += 22) {
            const crest = lavaTop + 2 + Math.sin(timestamp * 0.006 + x * 0.05) * 2 + (x % 44 === 0 ? waveA : waveB);
            ctx.fillRect(x, crest, 16, 2);
        }

        ctx.fillStyle = 'rgba(90, 0, 0, 0.18)';
        for (let x = -28 - textureOffset; x < canvas.width + 28; x += 28) {
            const columnHeight = 6 + Math.sin(timestamp * 0.003 + x * 0.09) * 3;
            ctx.fillRect(x, canvas.height - 8 - columnHeight, 18, 8 + columnHeight);
        }

        for (let i = 0; i < 10; i++) {
            const seed = i * 47.3;
            const bubbleX = ((seed * 13) - bubbleOffset + canvas.width + 120) % (canvas.width + 120) - 60;
            const bob = Math.sin(timestamp * 0.004 + seed) * 5;
            const rise = ((timestamp * (0.03 + i * 0.002)) + seed * 19) % 26;
            const bubbleY = canvas.height - 5 - rise + bob * 0.2;
            const size = 2 + (i % 3);
            ctx.globalAlpha = 0.2 + ((Math.sin(timestamp * 0.01 + seed) + 1) * 0.15);
            ctx.fillStyle = i % 2 === 0 ? '#ffd08a' : '#ff8c42';
            ctx.beginPath();
            ctx.arc(bubbleX, bubbleY, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        const haze = ctx.createLinearGradient(0, lavaTop - 18, 0, lavaTop + 10);
        haze.addColorStop(0, 'rgba(255, 140, 66, 0)');
        haze.addColorStop(0.45, 'rgba(255, 140, 66, 0.18)');
        haze.addColorStop(1, 'rgba(255, 240, 200, 0.08)');
        ctx.fillStyle = haze;
        ctx.fillRect(0, lavaTop - 18, canvas.width, 28);
    }

    function gameLoop(timestamp) {
        const dt = Math.min((timestamp - (lastTime || timestamp)) / (1000 / BASE_FPS), 3);
        lastTime = timestamp;

        ctx.fillStyle = '#0a0101'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // --- BACKGROUND ---
        bgLayers.forEach(l => {
            if (state === 'PLAYING') l.x -= l.speed * dt;
            if (l.x + l.w < -100) l.x = canvas.width + Math.random() * 100;
            ctx.fillStyle = l.color;
            if (l.type === 'cliff') { ctx.beginPath(); ctx.moveTo(l.x, l.y + l.h); ctx.lineTo(l.x + l.w/2, l.y); ctx.lineTo(l.x + l.w, l.y + l.h); ctx.fill(); }
            else ctx.fillRect(l.x, l.y, l.w, l.h);
        });

        // --- TRAIL (Behind Gameplay) ---
        for (let i = trail.length - 1; i >= 0; i--) {
            const t = trail[i]; t.x -= SCROLL_SPEED * dt; t.life -= 0.015 * dt;
            if (t.life <= 0) { trail.splice(i, 1); continue; }
            ctx.fillStyle = `rgba(255, 255, 255, ${t.life * 0.15})`; ctx.beginPath(); ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2); ctx.fill();
        }

        // --- LAVA ---
        drawLava(timestamp);

        if (state === 'PLAYING') {
            spawnTimer += dt; scrapTimer += dt;
            lavaScroll += SCROLL_SPEED * dt;
            if (powerupTimeLeft > 0) powerupTimeLeft -= (dt * 16.6);
            const hadFireResist = fireResistTimeLeft > 0;
            if (fireResistTimeLeft > 0) fireResistTimeLeft -= (dt * 16.6);
            if (pickupFlashTimeLeft > 0) pickupFlashTimeLeft -= (dt * 16.6);
            if (hadFireResist && fireResistTimeLeft <= 0) updateHUD();
            if (isThrusting) {
                player.vy += player.thrust * dt;
                playSound('thruster');
                if (Math.random() < 0.2 * dt) particles.push({ x: player.x, y: player.y + 15, vx: -1-Math.random()*2, vy: (Math.random()-0.5)*3, life: 1, color: '#ff9900' });
            }
            player.vy += player.gravity * dt; player.y += player.vy * dt;
            if (Math.random() < 0.3 * dt) trail.push({ x: player.x + 5, y: player.y + 10, life: 1.0, size: 4 + Math.random() * 6 });
            if (player.y < 0) { player.y = 0; player.vy = 0; }
            const lavaCeiling = canvas.height - 40;
            const isTouchingLava = player.y > lavaCeiling;
            if (player.y > lavaCeiling) {
                if (fireResistTimeLeft <= 0) endGame('lava');
                else {
                    if (!wasTouchingLava) {
                        spawnLavaSplash(player.x + 16, canvas.height - 20, Math.min(1.6, Math.abs(player.vy) / 3 + (isThrusting ? 0.3 : 0)));
                        playSound('lava-splash');
                    }
                    player.y = lavaCeiling;
                    if (player.vy > 1.5) player.vy = 1.5;
                }
            }
            wasTouchingLava = isTouchingLava;

            if (spawnTimer >= 85) {
                spawnTimer = 0; const gap = 160, h = Math.random() * (canvas.height - gap - 100) + 50;
                entities.push({ x: canvas.width, y: 0, w: 50, h: h, type: 'wall', passed: false }, { x: canvas.width, y: h + gap, w: 50, h: canvas.height, type: 'wall-bottom', passed: false });
            }

            if (scrapTimer >= 60) {
                scrapTimer = 0;
                collectibleSpawnsCounter++;
                if (collectibleSpawnsCounter >= nextPotionAt) {
                    nextPotionAt += (Math.floor(Math.random() * 6) + 5) * 2;
                    spawnCollectible('potion', 28, 22, 8);
                } else if (collectibleSpawnsCounter >= nextNuggetAt) {
                    nextNuggetAt += Math.floor(Math.random() * 6) + 5;
                    spawnCollectible('nugget', 22, 18, 8);
                } else {
                    spawnCollectible('scrap', 20, 20, 6);
                }
            }

        }

        if (state === 'PLAYING' || state === 'DYING') {
            for (let i = entities.length - 1; i >= 0; i--) {
                const e = entities[i];
                if (state === 'PLAYING') e.x -= SCROLL_SPEED * dt;
                if (state === 'PLAYING' && e.type === 'wall' && !e.passed && player.x > e.x + e.w) {
                    e.passed = true; wallScore++;
                    if (wallScore >= nextVillagerAt) {
                        spawnVillager();
                        nextVillagerAt += Math.floor(Math.random() * 8) + 12;
                    }
                    updateHUD();
                }
                if (e.type === 'wall' || e.type === 'wall-bottom') drawNetherWall(ctx, e.x, e.y, e.w, e.h);
                else if (e.type === 'scrap') drawNetherScrap(ctx, e.x, e.y + Math.sin(timestamp * 0.005) * 6, e.w, e.h);
                else if (e.type === 'nugget') drawGoldNugget(ctx, e.x, e.y, timestamp);
                else if (e.type === 'potion') drawFirePotion(ctx, e.x, e.y, timestamp);
                else if (e.type === 'villager') drawVillager(ctx, e.x, e.y, timestamp);
                const pB = getPlayerHitboxAt(player.x, player.y);
                if (state === 'PLAYING' && pB.x < e.x + e.w && pB.x + pB.w > e.x && pB.y < e.y + e.h && pB.y + pB.h > e.y) {
                    if (e.type === 'wall' || e.type === 'wall-bottom') { 
                        if (powerupTimeLeft <= 0 && fireResistTimeLeft <= 0) endGame('wall'); 
                    }
                    else if (e.type === 'scrap') { 
                        scrapScore++; updateHUD(); 
                        playSound('scrap');
                        for(let j=0; j<8; j++) particles.push({ x: e.x, y: e.y, vx: -2+Math.random()*4, vy: -2+Math.random()*4, life: 1, color: '#ffd700' }); 
                        entities.splice(i, 1); 
                    }
                    else if (e.type === 'nugget') { 
                        powerupTimeLeft = POWERUP_DURATION; 
                        if (fireResistTimeLeft > 0 && fireResistTimeLeft < POWERUP_DURATION) fireResistTimeLeft = POWERUP_DURATION;
                        triggerPickupFlash(220);
                        updateHUD();
                        playSound('nugget');
                        spawnNuggetFirework(e.x + e.w / 2, e.y + e.h / 2);
                        entities.splice(i, 1); 
                    }
                    else if (e.type === 'potion') {
                        fireResistTimeLeft = FIRE_RESIST_DURATION;
                        triggerPickupFlash(160);
                        updateHUD();
                        playSound('potion');
                        spawnPotionBurst(e.x + e.w / 2, e.y + e.h / 2);
                        entities.splice(i, 1);
                    }
                    else if (e.type === 'villager') {
                        emeraldScore++;
                        updateHUD();
                        playSound('emerald');
                        triggerVillagerReward();
                        entities.splice(i, 1);
                    }
                }
                if (e.x < -150) entities.splice(i, 1);
            }
        }

        if (state === 'REWARD') {
            rewardTimer -= dt;
            if (rewardTimer <= 0) {
                state = 'PLAYING';
                rewardTimer = 0;
            }
        }

        if (state === 'DYING') {
            deathTimer -= dt * 16.6;
            if (deathTimer <= 0) finishDeath();
        }

        if (state === 'PLAYING' || state === 'DYING') {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= 0.04 * dt;
                if (p.drag) { p.vx *= p.drag; p.vy *= p.drag; }
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size || 3, p.size || 3);
            }
            ctx.globalAlpha = 1;
        }

        // --- PLAYER (Bobbing in Menu) ---
        if (state !== 'DEAD') {
            ctx.save();
            const bob = (state === 'MENU') ? Math.sin(timestamp * 0.005) * 8 : 0;
            ctx.translate(player.x, player.y + bob);
            if (state === 'DYING' && deathCause === 'wall') {
                const crashProgress = 1 - Math.max(0, deathTimer) / 500;
                const impact = Math.sin(crashProgress * Math.PI * 0.9);
                const squashX = 1 + impact * 0.42;
                const squashY = 1 - impact * 0.34;
                ctx.translate(-8 - crashProgress * 6, crashProgress * 4);
                ctx.scale(squashX, squashY);
            } else if (state === 'DYING' && deathCause === 'lava') {
                const burnProgress = 1 - Math.max(0, deathTimer) / 500;
                ctx.translate(0, burnProgress * 4);
                ctx.rotate(Math.sin(timestamp * 0.04) * 0.04);
            }
            const isG = powerupTimeLeft > 0;
            const isF = fireResistTimeLeft > 0;
            const blinkTime = Math.max(powerupTimeLeft, fireResistTimeLeft);
            const blnk = blinkTime > 0 && blinkTime < 2000;
            drawPixelGhast(ctx, 0, 0, timestamp, isG, isF, blnk); 
            drawPixelPlayer(ctx, 0, 0, selectedPlayer, timestamp, isG, isF, blnk);
            ctx.restore();
        }

        drawTrajectoryOverlay(timestamp);

        if (state === 'PLAYING') {
            const topY = 15;
            let iconOffset = 0;
            if (powerupTimeLeft > 0) {
                const alpha = powerupTimeLeft < 2000 ? 0.35 + Math.abs(Math.sin(timestamp * 0.02)) * 0.45 : 0.65;
                drawPowerupIndicator(ctx, 'gold', canvas.width - 49, topY + iconOffset, timestamp, alpha);
                iconOffset += 40;
            }
            if (fireResistTimeLeft > 0) {
                const alpha = fireResistTimeLeft < 2000 ? 0.35 + Math.abs(Math.sin(timestamp * 0.02)) * 0.45 : 0.65;
                drawPowerupIndicator(ctx, 'potion', canvas.width - 49, topY + iconOffset, timestamp, alpha);
            }
        }

        if (state === 'REWARD') drawRewardScene(timestamp);

        // --- FOREGROUND SPARKS (Fastest Parallax) ---
        ashParticles.forEach(p => {
            if (state === 'PLAYING') { p.x -= (p.speedX + SCROLL_SPEED * 1.4) * dt; p.y += p.speedY * dt; }
            if (p.x < -20) p.x = canvas.width + 20; if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
            const flk = Math.random() > 0.96 ? 1.0 : (p.baseOpacity + (Math.sin(timestamp * p.shimmerSpeed) * 0.15));
            ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0.05, flk);
            ctx.fillRect(p.x, p.y, p.size, p.size);
            if (p.size > 2) { ctx.globalAlpha = flk * 0.3; ctx.fillRect(p.x - 1, p.y - 1, p.size + 2, p.size + 2); }
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(gameLoop);
    }

    function endGame(cause = 'wall') {
        if (state === 'DYING' || state === 'DEAD') return;
        state = 'DYING'; isThrusting = false;
        deathCause = cause;
        deathTimer = 500;
        if (cause === 'lava') {
            playSound('lava-hit');
            spawnLavaSplash(player.x + 16, canvas.height - 20, 1.9);
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: player.x + 10 + Math.random() * 14,
                    y: player.y + 12 + Math.random() * 10,
                    vx: -2 + Math.random() * 4,
                    vy: -3.5 + Math.random() * 2.5,
                    life: 0.8 + Math.random() * 0.25,
                    color: i % 2 === 0 ? '#ff8c42' : '#ffd08a',
                    size: 2 + Math.random() * 2,
                    drag: 0.94
                });
            }
        } else {
            playSound('wall-hit');
            spawnWallCrash(player.x + 16, player.y + 14);
            for (let i = 0; i < 12; i++) {
                const angle = (Math.PI * 2 * i) / 12;
                particles.push({
                    x: player.x + 16 + Math.cos(angle) * 4,
                    y: player.y + 14 + Math.sin(angle) * 4,
                    vx: Math.cos(angle) * (2.2 + Math.random() * 1.6),
                    vy: Math.sin(angle) * (2.2 + Math.random() * 1.6),
                    life: 0.35 + Math.random() * 0.12,
                    color: 'rgba(255, 235, 220, 0.85)',
                    size: 2 + Math.random() * 1.5,
                    drag: 0.88
                });
            }
            player.vy = Math.min(player.vy, 0.6);
        }
    }

    function finishDeath() {
        if (state === 'DEAD') return;
        state = 'DEAD';
        deathScreen.classList.remove('hidden'); hud.style.display = 'none';
        finalEmeraldsText.innerText = "EMERALDS: " + emeraldScore;
        finalScrapsText.innerText = "SCRAPS: " + scrapScore; finalWallsText.innerText = "WALLS : " + wallScore;
        finalTotalText.innerText = "SCORE : " + calculateTotalScore({ emeralds: emeraldScore, scraps: scrapScore, walls: wallScore });
        updatePlayer(selectedPlayer, emeraldScore, scrapScore, wallScore);
    }

    function resize() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        player.reset(); 
        if (state === 'MENU') { bgLayers = []; generateBG(); generateAsh(); } 
    }

    window.onresize = resize; 
    resize(); 
    fetchLeaderboard(); 
    requestAnimationFrame(gameLoop);
</script>
</body>
